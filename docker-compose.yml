services:
  schedule_tracker:
    build: .
    container_name: lucos_schedule_tracker
    ports: 
      - $PORT:$PORT
    environment:
      - PORT
    image: lucas42/lucos_schedule_tracker
    volumes:
      - "db:/var/lib/schedule_tracker/"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${PORT}/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  db: